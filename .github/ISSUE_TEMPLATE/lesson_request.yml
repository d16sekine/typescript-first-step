name: レッスン・演習の提案 / Lesson Request
description: 新しいレッスンや演習のトピックを提案する / Suggest a new lesson or exercise topic
labels: [enhancement]
body:
  - type: input
    id: topic
    attributes:
      label: トピック / Topic
      placeholder: "例: デコレータ、モジュールと名前空間、型レベルプログラミング"
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 提案理由 / Why it would be useful
      description: どんな学習者に、どんな場面で役立つかを書いてください
    validations:
      required: false
